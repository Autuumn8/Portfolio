<html lang="en">

  <title>Zian's Portfolio</title>
  <style>
    /* Basic Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #ffffff;
      color: #333;
      line-height: 1.6;
    }

    header {
      background-color: #cbe9ff;
      padding: 2rem 1rem;
      text-align: center;
    }

    nav {
      background-color: #333;
      color: white;
      display: flex;
      justify-content: center;
      gap: 2rem;
      padding: 1rem 0;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    nav a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      text-decoration: underline;
    }

    section {
      padding: 4rem 2rem;

      margin: auto;
    }

    .photo-container {
      width: 200px;
      height: 200px;

      background-color: #ddd;
      margin: 2rem auto;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      color: #666;
      text-align: center;
    }

    footer {
      text-align: center;
      background-color: #cbe9ff;
      padding: 1rem;
      margin-top: 2rem;
    }

    h1, h2 {
      color: #005f8d;
    }

    ul {
      padding-left: 1.5rem;
    }

    .projects li {
      margin-bottom: 0.5rem;
    }
  </style>
</head>
